name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (node-${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install deps (reproducible)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm test

      - name: Adversarial self-audit
        # audit.ts sets exitCode=2 on any confirmed critical finding.
        run: npm run audit

      - name: Fuzz (500 iters/category)
        run: npm run fuzz -- --iterations 500

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Generate SBOM (CycloneDX)
        run: npm run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: tengen-sbom
          path: sbom.json
          retention-days: 90

  loader-build:
    name: loader build (go-${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go vet
        run: go vet ./...
        working-directory: loader
      - name: go build
        run: go build -trimpath -ldflags='-s -w' -o tengen-loader .
        working-directory: loader
